<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | SigmaWeb</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #0ea5e9;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 0.8s ease forwards;
        }
    </style>
</head>

<body>
    <div class="max-w-lg w-full px-6">
        <div class="glass p-12 rounded-[2.5rem] text-center animate-fade-up">
            <div
                class="w-20 h-20 bg-sky-500/20 rounded-full flex items-center justify-center text-sky-500 mx-auto mb-8">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-bold mb-4">Message Sent!</h1>
            <p class="text-slate-400 text-lg mb-10">Thank you for reaching out to SigmaWeb. We've received your inquiry
                and will get back to you shortly.</p>
            <a href="index.html"
                class="inline-block px-10 py-4 bg-sky-500 text-black font-extrabold rounded-xl hover:bg-sky-400 transition-all shadow-lg shadow-sky-500/20">
                Back to Home
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
